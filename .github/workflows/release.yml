name: Release Crimpdeq 3D Case

on:
    release:
        types: [created]

permissions:
    contents: write

jobs:
    case:
        name: Build 3D case release files
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Prepare output folder
              run: mkdir -p artifacts

            - name: Build case_main.stl
              uses: flat35hd99/openscad-actions@v1.4
              with:
                  scad_file: case/case_main.scad
                  output_file: artifacts/case_main.stl

            - name: Build case_lid.stl
              uses: flat35hd99/openscad-actions@v1.4
              with:
                  scad_file: case/case_lid.scad
                  output_file: artifacts/case_lid.stl

            - name: Upload case release files
              uses: actions/upload-artifact@v6
              with:
                  name: release-case-files
                  path: |
                      artifacts/case_main.stl
                      artifacts/case_lid.stl
                  if-no-files-found: error
                  compression-level: 0

    publish:
        name: Upload files to GitHub release
        runs-on: ubuntu-latest
        needs:
            - case

        steps:
            - name: Download case release files
              uses: actions/download-artifact@v6
              with:
                  name: release-case-files
                  path: release-assets/case

            - name: Verify release assets exist
              run: |
                  test -f release-assets/case/case_main.stl
                  test -f release-assets/case/case_lid.stl

            - name: Upload release assets
              uses: svenstaro/upload-release-action@v2
              with:
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  tag: ${{ github.ref }}
                  file: release-assets/*/*
                  file_glob: true
                  overwrite: true
